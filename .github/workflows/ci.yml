name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run python -m mypy --strict src/

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: planets_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: apps/api
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/planets_test
      SECRET_KEY: ci-secret-key-for-testing-purposes-minimum-32-chars
      GOOGLE_CLIENT_ID: fake-client-id-for-ci-tests
      GOOGLE_CLIENT_SECRET: fake-client-secret-for-ci-tests
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: uv sync --dev
      - name: Run migrations
        run: uv run alembic upgrade head
      - name: Run tests with coverage
        run: uv run python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup env
        run: cp apps/frontend/.env.example apps/frontend/.env
      - name: Lint
        run: pnpm --filter frontend lint
      - name: Prettier check
        run: pnpm --filter frontend exec prettier --check .
      - name: Type check
        run: pnpm --filter frontend exec tsc --noEmit

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup env
        run: cp apps/frontend/.env.example apps/frontend/.env
      - name: Run tests with coverage
        run: pnpm --filter frontend exec vitest run --coverage --coverage.thresholds.lines=70

  lint-backoffice:
    name: Lint Backoffice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup env
        run: cp apps/backoffice/.env.example apps/backoffice/.env
      - name: Lint
        run: pnpm --filter backoffice lint
      - name: Prettier check
        run: pnpm --filter backoffice exec prettier --check .
      - name: Type check
        run: pnpm --filter backoffice exec tsc --noEmit

  test-backoffice:
    name: Test Backoffice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup env
        run: cp apps/backoffice/.env.example apps/backoffice/.env
      - name: Run tests with coverage
        run: pnpm --filter backoffice exec vitest run --coverage --coverage.thresholds.lines=70

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, lint-frontend, test-frontend, lint-backoffice, test-backoffice]
    steps:
      - uses: actions/checkout@v4
      - name: Build API
        run: docker build -t planets-api apps/api/
      - name: Build Frontend
        run: docker build -t planets-frontend apps/frontend/
      - name: Build Backoffice
        run: docker build -t planets-backoffice apps/backoffice/
