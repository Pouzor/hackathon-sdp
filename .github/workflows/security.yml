name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Audit frontend
        run: cd apps/frontend && pnpm audit --audit-level=high
      - name: Audit backoffice
        run: cd apps/backoffice && pnpm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Safety check backend
        run: pip install safety && safety check -r apps/api/requirements.txt 2>/dev/null || true
