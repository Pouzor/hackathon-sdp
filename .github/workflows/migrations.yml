name: Migrations Check

on:
  pull_request:
    paths:
      - 'apps/api/src/models/**'
      - 'apps/api/alembic/**'
      - 'apps/api/pyproject.toml'

jobs:
  check-migrations:
    name: Verify Alembic Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: planets_migrations
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> $GITHUB_PATH
      - run: uv sync --extra dev
      - name: Run migrations
        run: uv run alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/planets_migrations
          SECRET_KEY: ci-secret-key-for-testing-purposes-minimum-32-chars
          GOOGLE_CLIENT_ID: fake-client-id-for-ci-tests
          GOOGLE_CLIENT_SECRET: fake-client-secret-for-ci-tests
      - name: Check no pending migrations
        run: uv run alembic check
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/planets_migrations
          SECRET_KEY: ci-secret-key-for-testing-purposes-minimum-32-chars
          GOOGLE_CLIENT_ID: fake-client-id-for-ci-tests
          GOOGLE_CLIENT_SECRET: fake-client-secret-for-ci-tests
